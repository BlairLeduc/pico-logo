name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host:
    name: Host tests + e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure and build unit tests
        run: |
          cmake --preset=tests
          cmake --build --preset=tests

      - name: Run unit tests
        run: ctest --preset=tests

      - name: Build host REPL
        run: |
          cmake --preset=host
          cmake --build --preset=host

      - name: Run end-to-end golden tests
        run: tests/e2e/run_e2e.sh

  firmware:
    name: Firmware (${{ matrix.preset }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [pico2, pico2w, "pico+2w"]
    steps:
      - uses: actions/checkout@v4

      - name: Check out Pico SDK
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/pico-sdk
          ref: "2.3.0"
          path: pico-sdk
          submodules: recursive

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi ninja-build

      - name: Build firmware
        env:
          PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk
        run: |
          # The preset pins CMAKE_MAKE_PROGRAM to the VS Code Pico extension's
          # ninja path; override it with the system ninja on CI.
          cmake --preset='${{ matrix.preset }}' -DCMAKE_MAKE_PROGRAM="$(command -v ninja)"
          cmake --build --preset='${{ matrix.preset }}'

  reference:
    name: Reference link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check internal anchors
        run: python3 scripts/check_reference_anchors.py
